<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curadoria de Paletas - Adapta ColorCore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0d1117; color: #c9d1d9; font-family: system-ui, sans-serif; }
    .swatch { transition: all 0.2s ease; position: relative; }
    .swatch:hover { transform: translateY(-4px); }
    .swatch .trash-btn {
      opacity: 0;
      transition: opacity 0.2s;
    }
    .swatch:hover .trash-btn {
      opacity: 1;
    }
    .color-block { width: 100%; height: 80px; border-radius: 8px 8px 0 0; }
  </style>
</head>
<body class="p-8 pb-32">
  <div class="max-w-7xl mx-auto">
    <header class="mb-10 text-center">
      <h1 class="text-3xl font-bold mb-2">Curadoria de Paletas: Adapta ColorCore</h1>
      <p class="text-gray-400">Jogue fora (no ícone de lixeira) as cores que ficaram turvas/feias. Exporte no final!</p>
    </header>

    <div id="palettes-container" class="space-y-12"></div>

    <div class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-700 p-4 shadow-2xl flex justify-center items-center gap-6 z-50">
      <p class="text-sm text-gray-400">Quando terminar a limpeza, clique em exportar e cole o resultado para o Antigravity no chat:</p>
      <button id="exportBtn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-lg font-bold transition-colors">
        Exportar Paleta Filtrada
      </button>
    </div>
  </div>

  <!-- Modal para Output -->
  <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
    <div class="bg-gray-800 p-6 rounded-xl w-full max-w-3xl border border-gray-600">
      <div class="flex justify-between items-center mb-4">
         <h2 class="text-xl font-bold">Copie este resultado</h2>
         <button onclick="document.getElementById('modal').style.display='none'" class="text-red-400 hover:text-red-300">Fechar</button>
      </div>
      <textarea id="jsonOutput" class="w-full h-96 bg-gray-900 border border-gray-700 text-emerald-400 p-4 font-mono text-sm rounded cursor-text" readonly></textarea>
      <div class="mt-4 flex justify-end">
        <button id="copyBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-medium">Copiar para Área de Transferência</button>
      </div>
    </div>
  </div>

  <script>
    // Converte HSL para HEX
    function hslToHex(h, s, l) {
      l /= 100;
      const a = s * Math.min(l, 1 - l) / 100;
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
    }

    // HEX para HSL
    function hexToHsl(hex) {
      let r = 0, g = 0, b = 0;
      if (hex.length == 4) {
        r = parseInt(hex[1] + hex[1], 16);
        g = parseInt(hex[2] + hex[2], 16);
        b = parseInt(hex[3] + hex[3], 16);
      } else if (hex.length == 7) {
        r = parseInt(hex.substring(1, 3), 16);
        g = parseInt(hex.substring(3, 5), 16);
        b = parseInt(hex.substring(5, 7), 16);
      }
      r /= 255, g /= 255, b /= 255;
      let max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max == min) { h = s = 0; }
      else {
        let d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
    }

    // Algoritmo curado para gerar a escala baseada em HSL
    // Faz Hue-shifting leve: Cores quentes avermelham nas sombras, cores frias azulam
    function generateScale(baseHex) {
      const [baseH, baseS, baseL] = hexToHsl(baseHex);
      const tones = [50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 950];
      const scale = [];

      // Determinar o quão quente a cor é (0-60 e 300-360) para fazer o hue shift
      let hueShiftFactor = 0;
      if (baseH < 60 || baseH > 300) hueShiftFactor = -8; // Esfria/avermelha quentes no escuro
      else if (baseH >= 60 && baseH < 180) hueShiftFactor = 10; // Esverdeados
      else if (baseH >= 180 && baseH <= 300) hueShiftFactor = 15; // Azulados puxam pro royal no escuro

      tones.forEach((tone) => {
        // Luminosidade de 50 (95% luz) até 950 (5% luz)
        // O 500 será aproximadamente o L original
        let tempL = 0;
        let tempS = baseS;
        let tempH = baseH;

        if (tone === 500) {
            tempL = baseL;
        } else if (tone < 500) {
            // Mapeando do 50 ao 400
            const step = (95 - baseL) / 4.5;
            tempL = baseL + (step * (5 - (tone/100)));
            tempH = (baseH - (hueShiftFactor/2)) % 360; 
            tempS = Math.min(100, tempS * 0.95);
        } else {
            // Mapeando do 600 ao 950
            const step = (baseL - 8) / 4.5;
            const diff = (tone - 500) / 100;
            tempL = baseL - (step * diff);
            tempH = (baseH + hueShiftFactor) % 360;
            // Aumenta saturação ligeiramente nos escuros pra evitar ficar cor de lama
            tempS = Math.min(100, tempS * 1.15); 
        }

        if (tempH < 0) tempH += 360;

        scale.push({
          tone: tone,
          hex: hslToHex(tempH, tempS, tempL)
        });
      });
      return scale;
    }

    // Famílias de Cor Propostas (Apenas as solicitadas)
    const proposedFamilies = [
  {
    "id": "core-1",
    "name": "Red Core",
    "hex": "#ec190a"
  },
  {
    "id": "core-2",
    "name": "Deep Orange Core",
    "hex": "#661c01"
  },
  {
    "id": "core-3",
    "name": "Orange Core",
    "hex": "#f57309"
  },
  {
    "id": "core-4",
    "name": "Yellow Orange Core",
    "hex": "#b37307"
  },
  {
    "id": "core-5",
    "name": "Yellow Core",
    "hex": "#b5a302"
  },
  {
    "id": "core-6",
    "name": "Cyan Green Core",
    "hex": "#189b87"
  },
  {
    "id": "core-7",
    "name": "Cyan Core",
    "hex": "#33f5e8"
  },
  {
    "id": "core-8",
    "name": "Azure Core",
    "hex": "#0485d2"
  },
  {
    "id": "core-9",
    "name": "Blue Core",
    "hex": "#0a5faa"
  },
  {
    "id": "core-10",
    "name": "Deep Blue Core",
    "hex": "#021ed3"
  },
  {
    "id": "core-11",
    "name": "Indigo Core",
    "hex": "#0f0f92"
  },
  {
    "id": "core-12",
    "name": "Deep Purple Core",
    "hex": "#2702f5"
  },
  {
    "id": "core-13",
    "name": "Purple Core",
    "hex": "#6606ed"
  },
  {
    "id": "core-14",
    "name": "Magenta Purple Core",
    "hex": "#7a01bd"
  },
  {
    "id": "core-15",
    "name": "Magenta Core",
    "hex": "#d949e5"
  },
  {
    "id": "core-16",
    "name": "Pink Core",
    "hex": "#f904b7"
  },
  {
    "id": "core-17",
    "name": "Deep Pink Core",
    "hex": "#f5219c"
  },
  {
    "id": "core-18",
    "name": "Rose Red Core",
    "hex": "#e80532"
  },
  {
    "id": "core-19",
    "name": "Red Core",
    "hex": "#af3e43"
  }
];

    // Estado local da nossa paleta curada
    let curatedPalette = {};

    function init() {
      const container = document.getElementById('palettes-container');
      
      proposedFamilies.forEach(family => {
        const scale = generateScale(family.hex);
        curatedPalette[family.name] = scale; // Salva o array de objetos {tone, hex}

        // Header da Familia
        const section = document.createElement('div');
        section.id = `section-${family.name.replace(/\s+/g, '-')}`;
        
        section.innerHTML = `
          <h2 class="text-xl font-semibold mb-3 border-b border-gray-700 pb-2">${family.name} <span class="text-sm font-normal text-gray-500 ml-2">(Base original: ${family.hex})</span></h2>
          <div class="flex flex-wrap gap-3" id="grid-${family.id}"></div>
        `;
        container.appendChild(section);

        const grid = document.getElementById(`grid-${family.id}`);
        
        scale.forEach(item => {
          const isDarkText = hexToHsl(item.hex)[2] > 60; // SeL é alto, texto deve ser preto pra ler
          const card = document.createElement('div');
          card.id = `swatch-${family.id}-${item.tone}`;
          card.className = "swatch bg-gray-800 rounded-lg shadow-lg border border-gray-700 w-32 flex-shrink-0 flex flex-col";
          card.innerHTML = `
            <div class="color-block flex items-start justify-end p-2 relative" style="background-color: ${item.hex}">
               <button title="Remover este tom" onclick="removeSwatch('${family.name}', ${item.tone}, '${card.id}')" class="trash-btn bg-black/40 hover:bg-red-500 text-white rounded p-1.5 transition-colors absolute top-2 right-2 backdrop-blur-sm">
                 <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
               </button>
            </div>
            <div class="p-3 text-center flex-1 flex flex-col justify-center">
               <div class="font-bold text-gray-200">${item.tone}</div>
               <div class="text-xs text-gray-400 font-mono mt-1 uppercase">${item.hex}</div>
            </div>
          `;
          grid.appendChild(card);
        });
      });
    }

    window.removeSwatch = function(familyName, tone, elementId) {
      // Remove da interface
      const element = document.getElementById(elementId);
      if (element) {
        element.style.transform = 'scale(0.8)';
        element.style.opacity = '0';
        setTimeout(() => element.remove(), 200);
      }
      
      // Remove do objeto local
      curatedPalette[familyName] = curatedPalette[familyName].filter(c => c.tone !== tone);
    };

    document.getElementById('exportBtn').addEventListener('click', () => {
      // Remove famílias que ficaram sem cor do resultado
      const finalPalette = {};
      Object.keys(curatedPalette).forEach(key => {
        if (curatedPalette[key].length > 0) {
          finalPalette[key] = curatedPalette[key].map(c => ({
              hex: c.hex,
              name: `${key} ${c.tone}`,
              tone: c.tone
          }));
        }
      });
      
      const json = JSON.stringify(finalPalette, null, 2);
      document.getElementById('jsonOutput').value = json;
      document.getElementById('modal').style.display = 'flex';
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const textarea = document.getElementById('jsonOutput');
      textarea.select();
      document.execCommand('copy');
      const btn = document.getElementById('copyBtn');
      const originalText = btn.innerText;
      btn.innerText = "Copiado! ✓";
      btn.classList.replace('bg-blue-600', 'bg-emerald-600');
      btn.classList.replace('hover:bg-blue-500', 'hover:bg-emerald-500');
      setTimeout(() => {
        btn.innerText = originalText;
        btn.classList.replace('bg-emerald-600', 'bg-blue-600');
        btn.classList.replace('hover:bg-emerald-500', 'hover:bg-blue-500');
      }, 3000);
    });

    init();
  </script>
</body>
</html>
